<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Foco izquierdo -->
    <radialGradient id="spot-left" cx="25%" cy="20%" r="55%" fx="25%" fy="20%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.55"/>
      <stop offset="20%" stop-color="#c4993b" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#c4993b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c4993b" stop-opacity="0"/>
    </radialGradient>
    <!-- Foco derecho -->
    <radialGradient id="spot-right" cx="75%" cy="20%" r="55%" fx="75%" fy="20%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.55"/>
      <stop offset="20%" stop-color="#c4993b" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#c4993b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c4993b" stop-opacity="0"/>
    </radialGradient>
    <!-- Foco central -->
    <radialGradient id="spot-center" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.32"/>
      <stop offset="40%" stop-color="#c4993b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
    <!-- Halo de partículas de polvo -->
    <filter id="dust-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <!-- Glow del texto -->
    <filter id="text-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo negro -->
  <rect width="1920" height="1080" fill="#0d0d0d"/>

  <!-- Focos de luz -->
  <!-- Cono izquierdo -->
  <polygon points="200,0 600,700 0,700" fill="url(#spot-left)" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.65;0.85" dur="4s" repeatCount="indefinite"/>
  </polygon>
  <!-- Cono derecho -->
  <polygon points="1720,0 1920,700 1320,700" fill="url(#spot-right)" opacity="0.85">
    <animate attributeName="opacity" values="0.65;0.85;0.65" dur="4s" repeatCount="indefinite"/>
  </polygon>

  <!-- Halo central -->
  <ellipse cx="960" cy="480" rx="500" ry="350" fill="url(#spot-center)"/>

  <!-- Aparatos de foco (top) -->
  <!-- Foco izquierdo -->
  <g transform="translate(200, 20) rotate(15)">
    <rect x="-25" y="-20" width="50" height="40" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <rect x="-18" y="20" width="36" height="25" rx="2" fill="#222" stroke="#444" stroke-width="0.5"/>
    <ellipse cx="0" cy="38" rx="14" ry="5" fill="#f5e6c8" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.65;0.9" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <!-- Foco derecho -->
  <g transform="translate(1720, 20) rotate(-15)">
    <rect x="-25" y="-20" width="50" height="40" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <rect x="-18" y="20" width="36" height="25" rx="2" fill="#222" stroke="#444" stroke-width="0.5"/>
    <ellipse cx="0" cy="38" rx="14" ry="5" fill="#f5e6c8" opacity="0.9">
      <animate attributeName="opacity" values="0.65;0.9;0.65" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Partículas de polvo flotante -->
  <g filter="url(#dust-glow)" opacity="0.35">
    <circle cx="400" cy="300" r="2" fill="#f5e6c8">
      <animate attributeName="cy" values="300;250;300" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="400" r="1.5" fill="#f5e6c8">
      <animate attributeName="cy" values="400;340;400" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="350" r="1.8" fill="#f5e6c8">
      <animate attributeName="cy" values="350;280;350" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="320" r="1.2" fill="#f5e6c8">
      <animate attributeName="cy" values="320;270;320" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="500" r="1" fill="#c4993b">
      <animate attributeName="cy" values="500;440;500" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="450" r="1.5" fill="#c4993b">
      <animate attributeName="cy" values="450;380;450" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Líneas decorativas de acento (sin texto — el título viene del HTML) -->
  <line x1="710" y1="480" x2="1210" y2="480" stroke="#c4993b" stroke-width="0.5" opacity="0.15"/>
  <line x1="710" y1="600" x2="1210" y2="600" stroke="#c4993b" stroke-width="0.5" opacity="0.15"/>

  <!-- Viñeta inferior (fade a negro) -->
  <rect x="0" y="800" width="1920" height="280" fill="url(#vignette-bottom)"/>
  <defs>
    <linearGradient id="vignette-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="1"/>
    </linearGradient>
  </defs>
</svg>